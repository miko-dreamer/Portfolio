<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Grading System | Miko_Dreamer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; margin: 0; }
        
        .navbar { 
            background: #1e293b; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000;
        }
        .navbar .logo { font-size: 1.5rem; font-weight: bold; color: #3b82f6; text-decoration: none; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #3b82f6; }

        .container { padding: 40px 5%; display: flex; justify-content: center; min-height: 80vh; }
        
        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .login-card select, .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
        
        .dashboard { display: none; width: 100%; max-width: 1000px; background: #1e293b; padding: 30px; border-radius: 20px; }
        
        .search-area { background: #0f172a; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #334155; }
        .search-box { display: flex; gap: 10px; margin-top: 10px; }
        .search-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #3b82f6; background: #1e293b; color: white; }
        
        .admin-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; background: #1e293b; padding: 20px; border: 1px dashed #3b82f6; border-radius: 15px; }
        .admin-controls input { padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }

        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #3b82f6; }
        .grade-tag { padding: 4px 10px; border-radius: 5px; font-weight: bold; background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        #noDataMsg { display: none; color: #ef4444; padding: 20px; text-align: center; }
        .logout-btn { background: #ef4444; padding: 8px 15px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Miko_Dreamer</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="graphics-demo.html">Graphics</a></li>
            <li><a href="trading-demo.html">Trading</a></li>
            <li><a href="#" class="active">Grading</a></li>
        </ul>
    </nav>

    <div class="container">
        <div id="loginSection" class="login-card">
            <i class="fas fa-user-shield fa-3x" style="color: #3b82f6; margin-bottom: 15px;"></i>
            <h2>System Access</h2>
            <select id="userRole">
                <option value="student">Student Portal</option>
                <option value="admin">Teacher/Admin Access</option>
            </select>
            <input type="password" id="pass" placeholder="Enter Password">
            <button onclick="handleLogin()" class="btn" style="width: 100%;">Login</button>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 15px;">Admin: admin77 | Student: 1234</p>
        </div>

        <div id="dashboardSection" class="dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="welcomeMsg">Dashboard</h2>
                <button onclick="handleLogout()" class="btn logout-btn">Logout</button>
            </div>

            <div id="studentSearchView" class="search-area" style="display: none;">
                <h3><i class="fas fa-search"></i> Search Department Results</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Enter Dept (e.g. Cybersecurity)">
                    <button onclick="searchDepartment()" class="btn" style="background:#10b981;">Search</button>
                </div>
            </div>

            <div id="adminPanel" style="display: none;">
                <h3 style="color: #3b82f6;"><i class="fas fa-edit"></i> Manage Student Marks</h3>
                <div class="admin-controls">
                    <input type="text" id="stdName" placeholder="Student Name">
                    <input type="text" id="stdDept" placeholder="Department">
                    <input type="number" id="stdMark" placeholder="Mark (0-100)">
                    <button onclick="addStudent()" class="btn">Save to System</button>
                </div>
            </div>

            <div id="noDataMsg">No records found for this query.</div>

            <div id="tableContainer">
                <h4 id="tableTitle">Records List</h4>
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Mark</th>
                            <th>Grade</th>
                            <th id="adminActionHead" style="display:none;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let currentRole = "";

        // አስተማሪው ለመግባት የሚጠቀመው ቋሚ ፓስወርድ
        const ADMIN_PASS = "admin77"; 
        const STUDENT_PASS = "1234";

        function handleLogin() {
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('pass').value;

            if (role === 'admin' && pass === ADMIN_PASS) {
                loginSuccess('admin', "Admin Control Panel");
            } else if (role === 'student' && pass === STUDENT_PASS) {
                loginSuccess('student', "Student Results Portal");
            } else {
                alert("Invalid Password for the selected role!");
            }
        }

        function loginSuccess(role, title) {
            currentRole = role;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('welcomeMsg').innerText = title;

            if (role === 'admin') {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('studentSearchView').style.display = 'none';
                document.getElementById('adminActionHead').style.display = 'table-cell';
                document.getElementById('tableContainer').style.display = 'block';
                renderTable(students);
            } else {
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('studentSearchView').style.display = 'block';
                document.getElementById('adminActionHead').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'none';
            }
        }

        function addStudent() {
            const name = document.getElementById('stdName').value;
            const dept = document.getElementById('stdDept').value.trim().toLowerCase();
            const mark = parseFloat(document.getElementById('stdMark').value);

            if (!name || !dept || isNaN(mark)) { alert("All fields are required!"); return; }

            let grade = mark >= 90 ? 'A' : mark >= 80 ? 'B' : mark >= 70 ? 'C' : mark >= 60 ? 'D' : 'F';
            students.push({ name, dept, mark, grade });
            localStorage.setItem('students', JSON.stringify(students));
            renderTable(students);

            document.getElementById('stdName').value = '';
            document.getElementById('stdDept').value = '';
            document.getElementById('stdMark').value = '';
        }

        function searchDepartment() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = students.filter(s => s.dept === query);
            const tableCont = document.getElementById('tableContainer');
            const msg = document.getElementById('noDataMsg');

            if (filtered.length > 0) {
                msg.style.display = 'none';
                tableCont.style.display = 'block';
                document.getElementById('tableTitle').innerText = `Results for ${query.toUpperCase()}`;
                renderTable(filtered);
            } else {
                tableCont.style.display = 'none';
                msg.style.display = 'block';
            }
        }

        function renderTable(dataList) {
            const tbody = document.getElementById('studentBody');
            tbody.innerHTML = '';
            dataList.forEach((s, index) => {
                const row = tbody.insertRow();
                let action = currentRole === 'admin' ? `<td><button onclick="deleteStudent(${index})" style="color:#ef4444; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button></td>` : '';
                row.innerHTML = `<td>${s.name}</td><td>${s.dept.toUpperCase()}</td><td>${s.mark}</td><td><span class="grade-tag">${s.grade}</span></td>${action}`;
            });
        }

        function deleteStudent(index) {
            if(confirm("Delete this student?")) {
                students.splice(index, 1);
                localStorage.setItem('students', JSON.stringify(students));
                renderTable(students);
            }
        }

        function handleLogout() {
            location.reload();
        }
    </script>
</body>
</html>
