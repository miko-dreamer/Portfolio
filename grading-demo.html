<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading System Demo | Mikael</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .demo-section { padding: 100px 10%; display: flex; justify-content: center; }
        .demo-container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .input-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 30px; }
        .input-form input { 
            padding: 12px; border-radius: 10px; border: 1px solid var(--border-color);
            background: var(--bg-color); color: var(--text-color);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid var(--border-color); padding: 15px; text-align: left; }
        th { background: var(--primary-color); color: white; }
        .back-link { margin-bottom: 20px; display: inline-block; color: var(--primary-color); text-decoration: none; font-weight: bold; }
        @media (max-width: 768px) { .input-form { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="light-theme">
    <div class="demo-section">
        <div class="demo-container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
            <h2 style="margin-bottom: 20px;">Student Grading System <span class="highlight">(Live Demo)</span></h2>
            
            <div class="input-form">
                <input type="text" id="stdName" placeholder="Student Name">
                <input type="text" id="stdDept" placeholder="Department">
                <input type="number" id="stdMark" placeholder="Mark (0-100)">
                <button onclick="addStudent()" class="btn" style="margin: 0;">Add Student</button>
            </div>

            <table id="resultTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Mark</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // የቀድሞውን Theme Settings ለመያዝ
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); }

        function addStudent() {
            const name = document.getElementById('stdName').value;
            const dept = document.getElementById('stdDept').value;
            const mark = parseFloat(document.getElementById('stdMark').value);
            let grade = '';

            if(!name || !dept || isNaN(mark)) {
                alert("Please fill all fields correctly!");
                return;
            }

            // የውጤት አሰላል (ልክ በጃቫው ኮድህ ላይ እንዳደረግነው)
            if(mark >= 90) grade = 'A';
            else if(mark >= 80) grade = 'B';
            else if(mark >= 70) grade = 'C';
            else if(mark >= 60) grade = 'D';
            else grade = 'F';

            const table = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();
            row.style.animation = "fadeIn 0.5s ease";
            row.innerHTML = `<td>${name}</td><td>${dept}</td><td>${mark}</td><td><strong>${grade}</strong></td>`;
            
            // ሳጥኖቹን ማጽዳት
            document.getElementById('stdName').value = '';
            document.getElementById('stdDept').value = '';
            document.getElementById('stdMark').value = '';
        }
    </script>
</body>
</html>
